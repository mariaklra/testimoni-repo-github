<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni Moodies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf5; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen p-4 md:p-8">
<div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">

    <!-- Kolom Kiri: Form Testimoni -->
    <div class="lg:col-span-5 space-y-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-[#fcd34d] text-[#dc2626] p-3 rounded-full flex items-center justify-center">
                <i data-lucide="message-square-quote"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">Testimoni</h1>
        </div>

        <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm">
            <h2 class="text-xl font-bold mb-4">Berikan Ulasan Anda</h2>
            <div id="testimonialForm" class="space-y-5">

                <!-- Alert (error / sukses) -->
                <div id="alertBox" class="hidden px-4 py-3 rounded-xl flex items-start gap-3 animate-fade-in">
                    <i id="alertIcon" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                    <span id="alertText" class="text-sm font-medium"></span>
                </div>

                <!-- Pilih Emoji -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Profil</label>
                    <div class="flex flex-wrap gap-2" id="emojiContainer"></div>
                </div>

                <!-- Beri Bintang -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Penilaian</label>
                    <div class="flex gap-1" id="starContainer"></div>
                </div>

                <!-- Teks Ulasan -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Ulasan
                        <span id="charCount" class="font-normal text-gray-400 ml-1">(0/500)</span>
                    </label>
                    <textarea
                        id="reviewText"
                        rows="3"
                        maxlength="500"
                        placeholder="Tuliskan pengalaman Anda di sini..."
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#dc2626] focus:border-[#dc2626] outline-none transition-all resize-none"
                    ></textarea>
                </div>

                <!-- Tombol Kirim -->
                <button
                    id="submitBtn"
                    onclick="handleSubmit()"
                    class="w-full flex items-center justify-center gap-2 bg-[#dc2626] hover:bg-[#b91c1c] disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl transition-colors"
                >
                    <span id="submitLabel">Kirim Testimoni</span>
                    <i data-lucide="send" class="w-5 h-5" id="submitIcon"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Kolom Kanan: Daftar Testimoni -->
    <div class="lg:col-span-7 space-y-4">
        <div class="flex items-center gap-2 mb-4">
            <div id="totalReviews" class="bg-[#dc2626] text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">0</div>
            <h2 class="text-xl font-bold text-gray-800">Ulasan Masuk</h2>
        </div>
        <div id="testimonialsList" class="space-y-4 overflow-y-auto max-h-[80vh] pr-2 pb-10 custom-scrollbar"></div>
    </div>
</div>

<script>
// ============================================================
//  Konfigurasi
// ============================================================
const EMOJIS         = ['🪻','💐','🎀','🎐','🍡','🍨','🌸','🐰','🐱','🎏'];
const SUBMIT_COOLDOWN = 30 * 1000; // 30 detik (sinkron dengan server)

let selectedEmoji  = EMOJIS[0];
let selectedRating = 0;
let hoverRating    = 0;
let lastSubmitTime = 0;
let isSubmitting   = false;

// ============================================================
//  Utilitas: Escape HTML — MENCEGAH XSS
// ============================================================
function escapeHTML(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
}

// ============================================================
//  Alert
// ============================================================
function showAlert(type, message) {
    const box  = document.getElementById('alertBox');
    const icon = document.getElementById('alertIcon');
    const text = document.getElementById('alertText');

    text.textContent = message; // textContent aman dari XSS
    box.className    = 'px-4 py-3 rounded-xl flex items-start gap-3 animate-fade-in';

    if (type === 'error') {
        box.classList.add('bg-red-50', 'border', 'border-red-200', 'text-red-600');
        icon.setAttribute('data-lucide', 'alert-circle');
    } else {
        box.classList.add('bg-green-50', 'border', 'border-green-200', 'text-green-600');
        icon.setAttribute('data-lucide', 'check-circle');
    }

    lucide.createIcons();
    box.classList.remove('hidden');

    // Auto-hide setelah 5 detik
    setTimeout(() => box.classList.add('hidden'), 5000);
}

// ============================================================
//  Emoji
// ============================================================
function initEmojis() {
    const container = document.getElementById('emojiContainer');
    container.innerHTML = '';
    EMOJIS.forEach(emoji => {
        const btn = document.createElement('button');
        btn.type        = 'button';
        btn.textContent = emoji;
        btn.dataset.emoji = emoji;
        btn.addEventListener('click', () => { selectedEmoji = emoji; updateEmojis(); });
        container.appendChild(btn);
    });
    updateEmojis();
}

function updateEmojis() {
    document.querySelectorAll('#emojiContainer button').forEach(btn => {
        btn.className = btn.dataset.emoji === selectedEmoji
            ? 'text-2xl p-2 rounded-full transition-all cursor-pointer bg-red-50 scale-110 ring-2 ring-[#dc2626]'
            : 'text-2xl p-2 rounded-full transition-all cursor-pointer bg-gray-50 hover:bg-gray-100 grayscale-[0.5]';
    });
}

// ============================================================
//  Bintang
// ============================================================
function initStars() {
    const container = document.getElementById('starContainer');
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type      = 'button';
        btn.className = 'star-btn focus:outline-none transition-transform hover:scale-110 cursor-pointer';
        btn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                 fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" class="star-svg pointer-events-none">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>`;
        btn.addEventListener('click',      () => { selectedRating = i; updateStars(); });
        btn.addEventListener('mouseenter', () => { hoverRating = i;    updateStars(); });
        btn.addEventListener('mouseleave', () => { hoverRating = 0;    updateStars(); });
        container.appendChild(btn);
    }
    updateStars();
}

function updateStars() {
    document.querySelectorAll('.star-btn').forEach((btn, idx) => {
        const filled = (idx + 1) <= (hoverRating || selectedRating);
        const svg    = btn.querySelector('.star-svg');
        svg.setAttribute('fill',   filled ? '#facc15' : '#f3f4f6');
        svg.setAttribute('stroke', filled ? '#facc15' : '#e5e7eb');
    });
}

function generateStarHTML(rating) {
    return Array.from({ length: 5 }, (_, i) => {
        const filled = (i + 1) <= rating;
        return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="${filled ? '#facc15' : '#f3f4f6'}" stroke="${filled ? '#facc15' : '#e5e7eb'}"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>`;
    }).join('');
}

// ============================================================
//  Counter karakter
// ============================================================
document.getElementById('reviewText').addEventListener('input', function () {
    document.getElementById('charCount').textContent = `(${this.value.length}/500)`;
});

// ============================================================
//  Render daftar testimoni
// ============================================================
function renderList(testimonials) {
    const list  = document.getElementById('testimonialsList');
    const total = document.getElementById('totalReviews');

    list.innerHTML    = '';
    total.textContent = testimonials.length;

    if (testimonials.length === 0) {
        list.innerHTML = `
            <div class="text-center text-gray-500 py-10 bg-white rounded-3xl border border-gray-200 border-dashed">
                Belum ada testimoni. Jadilah yang pertama!
            </div>`;
        return;
    }

    testimonials.forEach(t => {
        const card = document.createElement('div');
        card.className = 'bg-white p-5 rounded-[2rem] border border-gray-200 shadow-sm flex flex-col sm:flex-row gap-5 animate-fade-in';

        // escapeHTML dipakai untuk teks; emoji sudah divalidasi server & whitelist client
        card.innerHTML = `
            <div class="flex-shrink-0 flex justify-center sm:block">
                <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center border-4 border-gray-50 text-5xl shadow-inner">
                    ${escapeHTML(t.emoji)}
                </div>
            </div>
            <div class="flex-1 flex flex-col justify-center">
                <p class="text-gray-700 text-base font-medium mb-3 text-center sm:text-left">
                    ${escapeHTML(t.pesan)}
                </p>
                <div class="flex gap-1 justify-center sm:justify-start">
                    ${generateStarHTML(t.rating)}
                </div>
            </div>`;
        list.appendChild(card);
    });
}

// ============================================================
//  Ambil testimoni dari server
// ============================================================
async function fetchTestimonials() {
    try {
        const res  = await fetch('ambil.php');
        const json = await res.json();
        if (json.status === 'success') renderList(json.data);
    } catch {
        console.warn('Gagal memuat testimoni dari server.');
    }
}

// ============================================================
//  Submit testimoni
// ============================================================
async function handleSubmit() {
    if (isSubmitting) return;

    const reviewText = document.getElementById('reviewText').value.trim();

    // Validasi client-side
    if (selectedRating === 0) { showAlert('error', 'Mohon berikan rating bintang terlebih dahulu!'); return; }
    if (!reviewText)           { showAlert('error', 'Mohon tuliskan ulasan Anda!'); return; }
    if (reviewText.length > 500) { showAlert('error', 'Ulasan maksimal 500 karakter.'); return; }

    // Rate limiting client-side (backup, server juga mengecek)
    const now = Date.now();
    if (lastSubmitTime && (now - lastSubmitTime) < SUBMIT_COOLDOWN) {
        const sisa = Math.ceil((SUBMIT_COOLDOWN - (now - lastSubmitTime)) / 1000);
        showAlert('error', `Tunggu ${sisa} detik sebelum mengirim ulasan berikutnya.`);
        return;
    }

    // Set loading state
    isSubmitting = true;
    const btn   = document.getElementById('submitBtn');
    const label = document.getElementById('submitLabel');
    btn.disabled   = true;
    label.textContent = 'Mengirim...';

    try {
        const body = new FormData();
        body.append('emoji',  selectedEmoji);
        body.append('pesan',  reviewText);
        body.append('rating', selectedRating);

        const res  = await fetch('simpan.php', { method: 'POST', body });
        const json = await res.json();

        if (json.status === 'success') {
            showAlert('success', 'Terima kasih! Ulasan Anda berhasil dikirim 🎉');
            lastSubmitTime = Date.now();

            // Reset form
            document.getElementById('reviewText').value = '';
            document.getElementById('charCount').textContent = '(0/500)';
            selectedRating = 0;
            selectedEmoji  = EMOJIS[0];
            updateEmojis();
            updateStars();

            // Refresh daftar dari server
            await fetchTestimonials();
        } else {
            showAlert('error', json.message || 'Gagal mengirim testimoni.');
        }
    } catch {
        showAlert('error', 'Terjadi kesalahan jaringan. Coba lagi.');
    } finally {
        isSubmitting      = false;
        btn.disabled      = false;
        label.textContent = 'Kirim Testimoni';
        lucide.createIcons();
    }
}

// ============================================================
//  Inisialisasi
// ============================================================
initEmojis();
initStars();
fetchTestimonials();
lucide.createIcons();
</script>
</body>
</html>

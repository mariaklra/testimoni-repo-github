<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni - Cookies by Mara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Menggunakan font bergaya tulisan tangan (Caveat) dan font bulat lucu (Fredoka) -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            /* Pola garis-garis biru dan kuning pucat ala Cookies by Mara */
            background: repeating-linear-gradient(
                90deg,
                #fcf5cc,
                #fcf5cc 40px,
                #dceef4 40px,
                #dceef4 80px
            );
            color: #5c3a21; /* Cokelat tua untuk teks */
        }
        .font-cursive {
            font-family: 'Caveat', cursive;
        }
        
        /* Custom Scrollbar yang lebih manis */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #b8d8e0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #96c4cf; }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Efek melayang (hover) untuk card */
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-3px) rotate(-1deg);
            box-shadow: 0 10px 25px -5px rgba(92, 58, 33, 0.15);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">

    <!-- Kolom Kiri: Form Testimoni -->
    <div class="lg:col-span-5 space-y-6">
        
        <!-- Header Brand -->
        <div class="flex flex-col items-center lg:items-start mb-8 text-center lg:text-left bg-white/80 backdrop-blur-sm p-6 rounded-[2rem] border-2 border-white shadow-sm transform -rotate-1">
            <h2 class="text-2xl font-bold text-[#8fb8a2] tracking-wide mb-[-10px]">What they say about</h2>
            <h1 class="text-6xl font-cursive font-bold text-[#5c3a21] drop-shadow-sm">Cookies by Mara</h1>
        </div>

        <div class="bg-white p-7 rounded-[2.5rem] border-[3px] border-white shadow-xl relative">
            <!-- Dekorasi kecil -->
            <div class="absolute -top-4 -right-4 w-12 h-12 bg-[#ffb6b9] rounded-full flex items-center justify-center text-white font-bold text-xl rotate-12 shadow-lg">✨</div>

            <h2 class="text-2xl font-cursive font-bold mb-5 text-[#5c3a21] text-center">Tinggalkan Jejak Manismu!</h2>
            <div class="space-y-5">

                <!-- Alert -->
                <div id="alertBox" class="hidden px-4 py-3 rounded-2xl flex items-start gap-3 animate-fade-in font-medium">
                    <i id="alertIcon" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                    <span id="alertText" class="text-sm"></span>
                </div>

                <!-- Pilih Emoji -->
                <div>
                    <label class="block text-[15px] font-semibold text-[#5c3a21] mb-2">Pilih Ikon Favoritmu</label>
                    <div class="flex flex-wrap gap-2 justify-center lg:justify-start" id="emojiContainer"></div>
                </div>

                <!-- Beri Bintang -->
                <div>
                    <label class="block text-[15px] font-semibold text-[#5c3a21] mb-2">Seberapa Enak?</label>
                    <div class="flex gap-1 justify-center lg:justify-start" id="starContainer"></div>
                </div>

                <!-- Teks Ulasan -->
                <div>
                    <label class="block text-[15px] font-semibold text-[#5c3a21] mb-2 flex justify-between">
                        Ceritakan Pengalamanmu
                        <span id="charCount" class="font-normal text-[#a68a77] text-sm">(0/500)</span>
                    </label>
                    <textarea
                        id="reviewText"
                        rows="4"
                        maxlength="500"
                        placeholder="Wah, cookies original choco-nya lumer banget..."
                        class="w-full p-4 bg-[#fcf5cc]/30 border-2 border-[#e6dfb8] rounded-2xl text-[#5c3a21] focus:ring-4 focus:ring-[#dceef4] focus:border-[#8fb8a2] outline-none transition-all resize-none placeholder-[#a68a77]"
                    ></textarea>
                </div>

                <!-- Tombol Kirim -->
                <button
                    id="submitBtn"
                    onclick="handleSubmit()"
                    class="w-full flex items-center justify-center gap-2 bg-[#5c3a21] hover:bg-[#432917] disabled:bg-[#a68a77] disabled:cursor-not-allowed text-white font-semibold py-4 px-6 rounded-2xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-1 active:translate-y-0"
                >
                    <span id="submitLabel" class="text-lg">Kirim Ulasan</span>
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Kolom Kanan: Daftar Testimoni -->
    <div class="lg:col-span-7 space-y-4 pt-2">
        <div class="flex items-center justify-between bg-white/80 backdrop-blur-sm p-4 rounded-2xl border-2 border-white shadow-sm mb-6">
            <h2 class="text-2xl font-cursive font-bold text-[#5c3a21]">Ulasan Teman Mara</h2>
            <div class="flex items-center gap-2">
                <span class="text-sm font-semibold text-[#8fb8a2]">Total Ulasan</span>
                <div id="totalReviews" class="bg-[#ffb6b9] text-white w-9 h-9 rounded-full flex items-center justify-center font-bold shadow-sm">0</div>
            </div>
        </div>
        
        <div id="testimonialsList" class="space-y-5 overflow-y-auto max-h-[75vh] pr-2 pb-10 custom-scrollbar">
            <!-- List ulasan akan dimuat disini oleh JS -->
        </div>
    </div>
</div>

<script>
// ============================================================
//  Konfigurasi Supabase (Tetap sama seperti aslinya)
// ============================================================
const SUPABASE_URL = 'https://adxqycsnwhxxuqhtjxrg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qGPhYJ8fVKPKfngRQ09vRw_xFJIA8ps';
const HEADERS = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`
};

// ============================================================
//  State & Tema Cookies
// ============================================================
// Emoji diganti tema Cookies & Dessert
const EMOJIS          = ['🍪','🥛','🍩','🍵','🍓','🧁','🍰','🥨','🧸','🤎'];
const SUBMIT_COOLDOWN = 30 * 1000;
let selectedEmoji     = EMOJIS[0];
let selectedRating    = 0;
let hoverRating       = 0;
let lastSubmitTime    = 0;
let isSubmitting      = false;

// ============================================================
//  Utilitas
// ============================================================
function escapeHTML(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
}

function showAlert(type, message) {
    const box  = document.getElementById('alertBox');
    const icon = document.getElementById('alertIcon');
    const text = document.getElementById('alertText');
    text.textContent = message;
    box.className = 'px-4 py-3 rounded-2xl flex items-start gap-3 animate-fade-in font-medium';
    if (type === 'error') {
        box.classList.add('bg-[#ffe4e6]', 'border-2', 'border-[#fda4af]', 'text-[#be123c]');
        icon.setAttribute('data-lucide', 'alert-circle');
    } else {
        box.classList.add('bg-[#dcfce7]', 'border-2', 'border-[#86efac]', 'text-[#166534]');
        icon.setAttribute('data-lucide', 'check-circle');
    }
    lucide.createIcons();
    box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 5000);
}

// ============================================================
//  Emoji Logic
// ============================================================
function initEmojis() {
    const container = document.getElementById('emojiContainer');
    container.innerHTML = '';
    EMOJIS.forEach(emoji => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = emoji;
        btn.dataset.emoji = emoji;
        btn.addEventListener('click', () => { selectedEmoji = emoji; updateEmojis(); });
        container.appendChild(btn);
    });
    updateEmojis();
}

function updateEmojis() {
    document.querySelectorAll('#emojiContainer button').forEach(btn => {
        // Styling disesuaikan dengan warna pastel Cookies by Mara
        btn.className = btn.dataset.emoji === selectedEmoji
            ? 'text-3xl p-2 rounded-full transition-all cursor-pointer bg-[#dceef4] scale-110 border-2 border-[#8fb8a2] shadow-sm'
            : 'text-2xl p-2 rounded-full transition-all cursor-pointer bg-white border-2 border-transparent hover:bg-[#fcf5cc] grayscale-[0.3] hover:grayscale-0';
    });
}

// ============================================================
//  Bintang Logic
// ============================================================
function initStars() {
    const container = document.getElementById('starContainer');
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'star-btn focus:outline-none transition-transform hover:scale-110 cursor-pointer';
        // Warna dasar bintang diubah agak krem
        btn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
                 fill="#fdfbf0" stroke="#e6dfb8" stroke-width="1.5" stroke-linecap="round"
                 stroke-linejoin="round" class="star-svg pointer-events-none drop-shadow-sm">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>`;
        btn.addEventListener('click',      () => { selectedRating = i; updateStars(); });
        btn.addEventListener('mouseenter', () => { hoverRating = i;    updateStars(); });
        btn.addEventListener('mouseleave', () => { hoverRating = 0;    updateStars(); });
        container.appendChild(btn);
    }
    updateStars();
}

function updateStars() {
    document.querySelectorAll('.star-btn').forEach((btn, idx) => {
        const filled = (idx + 1) <= (hoverRating || selectedRating);
        const svg = btn.querySelector('.star-svg');
        // Bintang menyala warna kuning pastel khas menu, stroke cokelat
        svg.setAttribute('fill',   filled ? '#fcd34d' : '#fdfbf0');
        svg.setAttribute('stroke', filled ? '#d97706' : '#e6dfb8');
    });
}

function generateStarHTML(rating) {
    return Array.from({ length: 5 }, (_, i) => {
        const filled = (i + 1) <= rating;
        return `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="${filled ? '#fcd34d' : '#fdfbf0'}" stroke="${filled ? '#d97706' : '#e6dfb8'}"
                     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>`;
    }).join('');
}

// ============================================================
//  Counter karakter
// ============================================================
document.getElementById('reviewText').addEventListener('input', function () {
    document.getElementById('charCount').textContent = `(${this.value.length}/500)`;
});

// ============================================================
//  Render daftar testimoni
// ============================================================
function renderList(testimonials) {
    const list  = document.getElementById('testimonialsList');
    const total = document.getElementById('totalReviews');
    list.innerHTML    = '';
    total.textContent = testimonials.length;

    if (testimonials.length === 0) {
        list.innerHTML = `
            <div class="text-center text-[#a68a77] py-12 bg-white/80 backdrop-blur-sm rounded-[2rem] border-2 border-white border-dashed font-medium text-lg">
                Belum ada ulasan. Yuk jadi yang pertama nyobain! 🍪
            </div>`;
        return;
    }

    testimonials.forEach((t, index) => {
        // Variasi rotasi kecil untuk kartu agar terlihat playful
        const rotation = index % 2 === 0 ? 'rotate-1' : '-rotate-1';
        
        const card = document.createElement('div');
        // Desain card disesuaikan jadi lebih lembut
        card.className = `bg-white p-6 rounded-[2rem] border-[3px] border-white shadow-md flex flex-col sm:flex-row gap-5 animate-fade-in card-hover ${rotation} transform transition-transform`;
        card.innerHTML = `
            <div class="flex-shrink-0 flex justify-center sm:block">
                <div class="w-20 h-20 bg-[#dceef4] rounded-full flex items-center justify-center border-4 border-white text-4xl shadow-sm">
                    ${escapeHTML(t.emoji)}
                </div>
            </div>
            <div class="flex-1 flex flex-col justify-center">
                <div class="flex gap-1 justify-center sm:justify-start mb-2 bg-[#fcf5cc] w-fit mx-auto sm:mx-0 px-3 py-1.5 rounded-full border border-white shadow-sm">
                    ${generateStarHTML(t.rating)}
                </div>
                <p class="text-[#5c3a21] text-[15px] font-medium leading-relaxed text-center sm:text-left mt-2">
                    "${escapeHTML(t.pesan)}"
                </p>
            </div>`;
        list.appendChild(card);
    });
}

// ============================================================
//  Fetch & Submit Data Supabase (Tidak diubah logikanya)
// ============================================================
async function fetchTestimonials() {
    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/testimoni?select=*&order=created_at.desc&limit=100`,
            { headers: HEADERS }
        );
        if (!res.ok) throw new Error();
        const data = await res.json();
        renderList(data);
    } catch {
        console.warn('Gagal memuat testimoni.');
    }
}

async function handleSubmit() {
    if (isSubmitting) return;

    const reviewText = document.getElementById('reviewText').value.trim();

    if (selectedRating === 0)      { showAlert('error', 'Ops! Jangan lupa kasih bintangnya ya ⭐'); return; }
    if (!reviewText)               { showAlert('error', 'Tuliskan ceritamu dulu ya!'); return; }
    if (reviewText.length > 500)   { showAlert('error', 'Ulasan maksimal 500 karakter.'); return; }

    const now = Date.now();
    if (lastSubmitTime && (now - lastSubmitTime) < SUBMIT_COOLDOWN) {
        const sisa = Math.ceil((SUBMIT_COOLDOWN - (now - lastSubmitTime)) / 1000);
        showAlert('error', `Tunggu ${sisa} detik lagi ya untuk kirim ulang.`);
        return;
    }

    isSubmitting = true;
    const btn   = document.getElementById('submitBtn');
    const label = document.getElementById('submitLabel');
    btn.disabled      = true;
    label.textContent = 'Memanggang ulasan... 🍪';

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/testimoni`, {
            method: 'POST',
            headers: { ...HEADERS, 'Prefer': 'return=minimal' },
            body: JSON.stringify({
                emoji:  selectedEmoji,
                pesan:  reviewText,
                rating: selectedRating
            })
        });

        if (res.ok) {
            showAlert('success', 'Yey! Terima kasih ulasannya yang manis 💖');
            lastSubmitTime = Date.now();

            document.getElementById('reviewText').value = '';
            document.getElementById('charCount').textContent = '(0/500)';
            selectedRating = 0;
            selectedEmoji  = EMOJIS[0];
            updateEmojis();
            updateStars();
            await fetchTestimonials();
        } else {
            const err = await res.json();
            showAlert('error', err.message || 'Gagal mengirim testimoni.');
        }
    } catch {
        showAlert('error', 'Koneksi terputus. Coba lagi ya.');
    } finally {
        isSubmitting      = false;
        btn.disabled      = false;
        label.textContent = 'Kirim Ulasan';
        lucide.createIcons();
    }
}

// ============================================================
//  Inisialisasi
// ============================================================
initEmojis();
initStars();
fetchTestimonials();
lucide.createIcons();

setInterval(fetchTestimonials, 5000);
</script>
</body>
</html>
